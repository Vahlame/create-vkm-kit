name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Callable so `release.yml` can require the SAME gates before it publishes.
  # Neither trigger above fires on a tag push, so before this a tagged release
  # reached npm having run nothing but the version/changelog/license checks.
  workflow_call:

permissions:
  contents: read

# Rapid pushes to a PR branch otherwise run overlapping full matrices (13 jobs each,
# 3 OSes). Superseded runs tell you nothing, so cancel them — but never on main or
# when called from release.yml, where every commit's result is a record worth having
# and a cancelled run would masquerade as a release gate that "did not fail".
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# All third-party actions are pinned to a commit SHA (with version comment) to
# guard the supply chain. To bump, resolve the new SHA with:
#   gh api repos/<owner>/<repo>/git/refs/tags/<vN> --jq '.object.sha'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      # `tomllib` is stdlib only from 3.11, and the agent.toml step below is the
      # single schema check on that file — don't let it ride on whatever `python`
      # the runner image happens to expose. Pinned like test-python/retrieval-bench.
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: install
        run: npm ci
      - name: version consistency (badge == packages == CHANGELOG)
        run: node scripts/version.mjs check
      # `**/*.md` does NOT match inside dot-directories, so the second pattern is
      # load-bearing: without it .agents/rules/*.md, .continue/rules/*.md and
      # .github/PULL_REQUEST_TEMPLATE.md were silently unlinted — which is also why
      # .markdownlintignore lists a .github file that could never have been reached.
      - name: markdownlint
        run: npx --yes markdownlint-cli@0.49.0 "**/*.md" ".*/**/*.md" --ignore-path .markdownlintignore
      - name: prettier
        run: npx --yes prettier@3.8.4 --check "**/*.{json,yml,yaml,md,mjs,js,cjs,ts}"
      - name: eslint (incl. type-aware promise rules over all JS)
        run: npm run lint
      # "strict" is exact, not aspirational: the TS pass is fully strict; the checkJs
      # pass enables every strict sub-flag measured to cost zero (see the //strict note
      # in tsconfig.checkjs.json for the three still off and what each would cost).
      - name: typecheck (strict TS scripts + partially-strict checkJs over shipped JS)
        run: npm run typecheck
      - name: sync agents
        run: npm run sync-agents:check
      # Relative links AND #anchor fragments against real heading slugs — coverage the
      # lychee job does not provide. Was written, wired into package.json, and never run.
      - name: linkcheck (in-repo links + anchors)
        run: npm run linkcheck
      - name: license mirrors (packages/* == root LICENSE.md)
        run: npm run license:sync:check
      - name: validate agent.toml (tomllib)
        run: python -c "import pathlib,tomllib;tomllib.loads(pathlib.Path('agent.toml').read_text(encoding='utf-8'));print('agent.toml ok')"

  test-go:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: go test -race (ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        run: go test ./... -race
      - name: go build (unix)
        if: runner.os != 'Windows'
        run: go build -o obsidian-memoryd ./cmd/obsidian-memoryd
      - name: go build (windows)
        if: runner.os == 'Windows'
        run: go build -o obsidian-memoryd.exe ./cmd/obsidian-memoryd
      - name: binary size under 20MB (ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: test $(wc -c < obsidian-memoryd) -lt 20971520

  # The shipped daemon's dependency tree had NO automation asking whether it carried
  # advisories: dependabot covered only actions, and nothing ran govulncheck. It was
  # carrying 10 REACHABLE vulnerabilities (called, not merely present) across go-git,
  # circl and x/crypto — all with published fixes. This gate is what keeps that at zero.
  #
  # Deliberately a hard gate, not informational: a `continue-on-error` security step is
  # the silent-pass antipattern. `stable` rather than go-version-file on purpose — most
  # advisories here are Go stdlib ones, fixed by the toolchain, and pinning to the
  # go.mod directive would report vulns it is impossible to act on from this repo.
  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: govulncheck (reachable advisories in the shipped daemon)
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  test-node:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-14]
        node: [24]
        # `engines: node >=20` is declared in five manifests and advertised in the
        # README badge, and until this leg existed nothing verified it: every job
        # pinned 24, and there is no runtime guard either. One ubuntu leg on the
        # declared floor is enough to keep the claim honest without tripling the
        # matrix — if it ever fails, either the code or the claim is wrong, and
        # both are worth knowing.
        include:
          - os: ubuntu-latest
            node: 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test --workspaces --if-present

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pip install -e ./packages/obsidian-memory-rag
      - run: pytest packages/obsidian-memory-rag/tests

  retrieval-bench:
    # MEASURED retrieval quality (recall@k / MRR / hit@1) over a fixed labelled
    # corpus, on the dependency-free deterministic embedder — a real gate, unlike
    # eval-harness-smoke. Fails the build if retrieval regresses below the floor.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install -e ./packages/obsidian-memory-rag
      - name: recall@5 / MRR / hit@1 / nDCG@5 / MAP gate (deterministic, hashing embedder)
        run: |
          python -m obsidian_memory_rag bench-recall \
            --corpus evals/retrieval/corpus \
            --queries evals/retrieval/queries.jsonl \
            --assert-recall 0.95 --assert-mrr 0.90 --assert-hit1 0.90 \
            --assert-ndcg 0.93 --assert-map 0.93 --assert-p95-ms 500
      - name: learning-effectiveness gate — same corpus with the pin-failures lever (ADR-0038)
        run: |
          python -m obsidian_memory_rag bench-recall \
            --corpus evals/retrieval/corpus \
            --queries evals/retrieval/queries.jsonl \
            --pin-failures \
            --assert-recall 0.95 --assert-mrr 0.90 --assert-hit1 0.90 \
            --assert-ndcg 0.93 --assert-map 0.93
      - name: token-economy gate (passage-first vs whole-note, completeness-gated, ADR-0032/0034)
        run: |
          python -m obsidian_memory_rag bench-tokens \
            --corpus evals/tokens/corpus \
            --queries evals/tokens/queries.jsonl \
            --assert-savings 0.40 --assert-answered 1.0 \
            --assert-wire-savings 0.30
      - name: assemble-context gate (one-call bundle vs naive multi-call, completeness-gated, ADR-0045)
        run: |
          python -m obsidian_memory_rag bench-assemble \
            --corpus evals/assemble/corpus \
            --queries evals/assemble/queries.jsonl \
            --assert-savings 0.60 --assert-answered 0.90

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          # github.com answers 128-concurrent HTTP/2 bursts with GOAWAY/protocol errors
          # (transport-level, so the built-in GITHUB_TOKEN API fallback never applies):
          # cap concurrency and retry with backoff instead.
          args: --no-progress --max-redirects 5 --max-concurrency 32 --max-retries 4 --retry-wait-time 2 .
          fail: true

  secrets-scan:
    # The gitleaks CLI (MIT) is invoked directly: gitleaks-action v3 phones home
    # to a license server on every run, so an outage there fails the job even
    # with zero leaks. Pinned by version + sha256, same default ruleset.
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: install gitleaks (checksum-verified)
        run: |
          curl -fsSL --retry 3 -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
      - name: scan full git history
        run: ./gitleaks git --redact --no-banner .

  mcp-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - run: npm ci
      - name: basic-memory MCP handshake (real JSON-RPC, lists tools)
        run: node scripts/mcp-smoke.mjs

  e2e-smoke:
    # Full-stack smoke the per-component benches can't provide: real installer →
    # real Python index → real hybrid MCP over stdio → search / write / search-again.
    # Proves the pieces are wired, not just individually green.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: npm ci
      - name: install → index → search → write → search-again (real stdio MCP)
        run: node scripts/e2e-smoke.mjs

  eval-harness-smoke:
    # NOT a model adherence eval. This verifies the eval *harness* runs end-to-end
    # with a deterministic stub provider; the gate is always 1.0 unless the harness
    # itself breaks. Real adherence requires a live LLM + MCP, run promptfoo locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - run: npm ci
      - name: harness smoke (stub provider, deterministic)
        run: node evals/run-adherence-ci.mjs
