name: release

# Two entry points, same guarded pipeline:
#   - tag push vX.Y.Z (the normal path)
#   - workflow_dispatch on main: derives the tag from the version markers and
#     creates it as part of the release — the fallback for environments whose
#     git transport can push branches but not tags.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: guard — tag matches every version marker
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch: the version markers are the source of truth.
            tag="$(node scripts/version.mjs print)"
          fi
          changelog="$(node scripts/version.mjs print)"
          if [ "$tag" != "$changelog" ]; then
            echo "tag v$tag != CHANGELOG latest $changelog" >&2
            exit 1
          fi
          node scripts/version.mjs check
          echo "RELEASE_TAG=v$tag" >> "$GITHUB_ENV"
      - name: extract changelog section
        id: changelog
        shell: bash
        run: |
          tag="${RELEASE_TAG#v}"
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $tag" >&2
            exit 1
          fi
      - name: create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          draft: false
          prerelease: false

  # Publishes THE public package to npm so a tagged release no longer requires a
  # manual `npm publish` (the cause of the 3.5.0/3.6.0 marker drift):
  # @vkmikc/create-vkm-kit, the real installer.
  #
  # The old name @vkmikc/create-obsidian-memory is NO LONGER PUBLISHED (ADR-0050
  # amendment, 2026-07-20). The forwarding shim ADR-0041/0050 designed never
  # actually reached npm: every attempt since 4.0.0 failed because the granular
  # NPM_TOKEN only covers the new name, and npm reports that as a 404 ("not found
  # or you do not have permission"), which read like a missing package. Meanwhile
  # the old name was deprecated — so it serves the last real v3 kit (3.15.0) and
  # publishing 4.x to it would silently UN-deprecate the latest version. One
  # signpost, not two live entry points: the old name stays frozen + deprecated,
  # and packages/create-obsidian-memory-shim/ stays in-tree, unpublished.
  #
  # FAILS LOUDLY if the NPM_TOKEN secret is missing — a "successful" release that
  # never reached npm shipped 4.2.0 and 4.3.0 late, and 4.4.0 hit the same wall
  # with a secret that existed but held an empty value. The other packages stay
  # private (obsidian-memory-mcp, vkm-doctor, vkm-spec) or pip-only (rag).
  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'Vahlame/create-vkm-kit' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: guard — LICENSE.md mirror matches root
        run: node scripts/license-sync.mjs --check
      - name: publish create-vkm-kit
        working-directory: packages/create-vkm-kit
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN not set — npm publish did NOT run. The GitHub release exists" \
              "but npm is now behind (this silent skip shipped 4.2.0 and 4.3.0 late)." \
              "Fix: gh secret set NPM_TOKEN, then re-run this workflow." >&2
            exit 1
          fi
          npm publish --access public
