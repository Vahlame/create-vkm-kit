name: release

# Two entry points, same guarded pipeline:
#   - tag push vX.Y.Z (the normal path)
#   - workflow_dispatch on main: derives the tag from the version markers and
#     creates it as part of the release — the fallback for environments whose
#     git transport can push branches but not tags.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: guard — tag matches every version marker
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            tag="${GITHUB_REF_NAME#v}"
          else
            # Manual dispatch: the version markers are the source of truth.
            tag="$(node scripts/version.mjs print)"
          fi
          changelog="$(node scripts/version.mjs print)"
          if [ "$tag" != "$changelog" ]; then
            echo "tag v$tag != CHANGELOG latest $changelog" >&2
            exit 1
          fi
          node scripts/version.mjs check
          echo "RELEASE_TAG=v$tag" >> "$GITHUB_ENV"
      - name: extract changelog section
        id: changelog
        shell: bash
        run: |
          tag="${RELEASE_TAG#v}"
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $tag" >&2
            exit 1
          fi
      - name: create release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          draft: false
          prerelease: false

  # Publishes the one public package (@vkmikc/create-obsidian-memory) to npm so a
  # tagged release no longer requires a manual `npm publish` (the cause of the
  # 3.5.0/3.6.0 marker drift). Runs only when an NPM_TOKEN secret is configured;
  # the other packages stay private (obsidian-memory-mcp) or pip-only (rag).
  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'Vahlame/obsidian-memory-kit' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
      - name: guard — LICENSE.md mirror matches root
        run: node scripts/license-sync.mjs --check
      - name: publish create-obsidian-memory
        working-directory: packages/create-obsidian-memory
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping publish (configure repo secret to enable)." >&2
            exit 0
          fi
          npm publish --access public
