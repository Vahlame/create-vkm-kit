name: secret-probe

# TEMPORARY diagnostic — deleted right after it answers one question:
# does `secrets.NPM_TOKEN` reach a job with a non-empty value?
# Prints ONLY the length and a boolean, never the value.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: length only, never the value
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "expression-says-nonempty=${{ secrets.NPM_TOKEN != '' }}"
          echo "env-length=${#TOKEN}"
