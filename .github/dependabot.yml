version: 2

# Four ecosystems ship in this repo — npm (root + packages/*), Go (the daemon), pip
# (packages/obsidian-memory-rag) and the workflows' own actions. Only the last was
# covered, while ci.yml's banner presents SHA-pinning as *the* supply-chain control:
# that guards how actions are fetched, not what the dependency trees contain.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - ci
    open-pull-requests-limit: 5

  # One entry covers the root manifest and every packages/* workspace: npm workspaces
  # resolve from the root lockfile.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
    labels:
      - dependencies
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # TypeScript 7 breaks both CI gates today: `typecheck` (stricter inference
      # surfaces ~24 new errors) and `lint` (typescript-eslint's typescript-estree
      # only *detects* TS7, it doesn't support it — ESLint crashes). Hold the major
      # until the toolchain catches up; adopt it via a dedicated migration PR.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 3

  - package-ecosystem: pip
    directory: /packages/obsidian-memory-rag
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - python
    open-pull-requests-limit: 3
