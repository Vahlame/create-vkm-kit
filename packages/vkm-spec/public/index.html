<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>vkm-spec</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark light;
      }
      body {
        font-family: ui-monospace, Consolas, monospace;
        max-width: 920px;
        margin: 1.5rem auto;
        padding: 0 1rem;
      }
      h1 {
        font-size: 1.1rem;
        margin-bottom: 0.25rem;
      }
      #vault {
        color: #888;
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }
      label {
        display: block;
        margin-top: 0.75rem;
        font-size: 0.85rem;
        color: #888;
      }
      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 0.95rem;
        padding: 0.4rem;
      }
      textarea#idea {
        min-height: 3.5rem;
        resize: vertical;
      }
      textarea#xml {
        width: 100%;
        min-height: 20rem;
        margin-top: 0.75rem;
        white-space: pre;
        word-break: normal;
        border: 1px solid #888;
        padding: 0.6rem;
        font-size: 0.82rem;
        overflow: auto;
        resize: vertical;
      }
      .row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-top: 0.75rem;
        flex-wrap: wrap;
      }
      button {
        font-family: inherit;
        font-size: 0.95rem;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }
      #copyBtn {
        font-weight: bold;
      }
      #copyBtn.done {
        background: #2e7d32;
        color: white;
      }
      #stats {
        font-size: 0.8rem;
        color: #888;
      }
      #status {
        font-size: 0.8rem;
        margin-top: 0.4rem;
      }
      #status.thin {
        color: #b8860b;
      }
      #source {
        font-size: 0.75rem;
        padding: 0.15rem 0.5rem;
        border-radius: 0.3rem;
        font-weight: bold;
      }
      #source.ollama {
        background: #2e7d32;
        color: white;
      }
      #source.fallback {
        background: #b8860b;
        color: white;
      }
      #source.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>vkm-spec</h1>
    <div id="vault">vault: cargando…</div>

    <label for="project">Proyecto (opcional)</label>
    <input id="project" list="projects" placeholder="empezá a escribir…" autocomplete="off" />
    <datalist id="projects"></datalist>

    <label for="idea">Idea</label>
    <textarea id="idea" placeholder="qué querés construir…" autofocus></textarea>

    <div class="row">
      <button id="draftBtn">Draftear con Ollama</button>
      <button id="compileBtn">Compilar (determinístico)</button>
      <span id="source" class="hidden"></span>
      <span id="stats"></span>
    </div>
    <div id="status"></div>

    <label for="xml">Prompt compilado (editable antes de copiar)</label>
    <textarea
      id="xml"
      spellcheck="false"
      placeholder="(el XML compilado aparece acá — es editable)"
    ></textarea>

    <div class="row">
      <button id="copyBtn">Copiar al portapapeles</button>
    </div>

    <script>
      const ideaEl = document.getElementById("idea");
      const projectEl = document.getElementById("project");
      const xmlEl = document.getElementById("xml");
      const draftBtn = document.getElementById("draftBtn");
      const compileBtn = document.getElementById("compileBtn");
      const copyBtn = document.getElementById("copyBtn");
      const statsEl = document.getElementById("stats");
      const statusEl = document.getElementById("status");
      const sourceEl = document.getElementById("source");
      const vaultEl = document.getElementById("vault");
      const projectsList = document.getElementById("projects");

      fetch("/api/projects")
        .then((r) => r.json())
        .then((data) => {
          vaultEl.textContent = "vault: " + data.vault;
          for (const name of data.projects) {
            const opt = document.createElement("option");
            opt.value = name;
            projectsList.appendChild(opt);
          }
        })
        .catch(() => {
          vaultEl.textContent = "vault: (no se pudo leer)";
        });

      function setSource(source) {
        if (!source) {
          sourceEl.className = "hidden";
          sourceEl.textContent = "";
          return;
        }
        sourceEl.className = source; // "ollama" | "fallback"
        sourceEl.textContent = source;
      }

      function setXml(xml) {
        xmlEl.value = xml || "";
        const chars = (xml || "").length;
        statsEl.textContent = chars
          ? chars + " caracteres (~" + Math.round(chars / 4) + " tokens estimados)"
          : "";
      }

      function setStatus(text, thin) {
        statusEl.textContent = text || "";
        statusEl.className = thin ? "thin" : "";
      }

      function busy(on) {
        draftBtn.disabled = on;
        compileBtn.disabled = on;
      }

      // Deterministic path: assemble context, then compile (no LLM).
      async function compile() {
        const idea = ideaEl.value.trim();
        if (!idea) {
          setStatus("Escribí una idea primero.");
          return;
        }
        busy(true);
        setStatus("Compilando…");
        try {
          const project = projectEl.value.trim() || undefined;
          const aRes = await fetch("/api/assemble", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idea, project })
          });
          const ctx = await aRes.json();
          if (!aRes.ok) {
            setStatus("Error: " + (ctx.error || aRes.status), true);
            return;
          }
          const cRes = await fetch("/api/compile", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              idea,
              project,
              historicalDecisions: ctx.historicalDecisions,
              activePatterns: ctx.activePatterns,
              techStack: ctx.techStack,
              currentState: ctx.currentState,
              usedFallback: ctx.usedFallback,
              backendError: ctx.backendError
            })
          });
          const data = await cRes.json();
          if (!cRes.ok) {
            setStatus("Error: " + (data.error || cRes.status), true);
            return;
          }
          setXml(data.xml);
          setSource("fallback");
          setStatus(
            ctx.usedFallback ? "Sin contexto previo encontrado — revisá antes de copiar." : "",
            ctx.usedFallback
          );
        } catch (e) {
          setStatus("Error de conexión: " + e.message, true);
        } finally {
          busy(false);
        }
      }

      // Parse Server-Sent-Events frames out of a growing buffer; returns [frames, remainder].
      function drainSse(buffer) {
        const frames = [];
        let idx;
        while ((idx = buffer.indexOf("\n\n")) >= 0) {
          const block = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          let event = "message";
          const dataLines = [];
          for (const line of block.split("\n")) {
            if (line.startsWith("event:")) event = line.slice(6).trim();
            else if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
          }
          frames.push({ event, data: dataLines.join("\n") });
        }
        return [frames, buffer];
      }

      // LLM path: stream /api/draft; an `error` frame still carries a working fallback xml.
      async function draft() {
        const idea = ideaEl.value.trim();
        if (!idea) {
          setStatus("Escribí una idea primero.");
          return;
        }
        busy(true);
        setSource(null);
        setStatus("Consultando Ollama…");
        try {
          const project = projectEl.value.trim() || undefined;
          const res = await fetch("/api/draft", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idea, project })
          });
          if (!res.ok || !res.body) {
            const data = await res.json().catch(() => ({}));
            setStatus("Error: " + (data.error || res.status), true);
            return;
          }
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          for (;;) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            let frames;
            [frames, buffer] = drainSse(buffer);
            for (const frame of frames) {
              const payload = frame.data ? JSON.parse(frame.data) : {};
              if (frame.event === "progress") {
                setStatus("Ollama draft… " + payload.tokens + " chunks");
              } else if (frame.event === "done") {
                setXml(payload.xml);
                setSource(payload.source);
                setStatus("");
              } else if (frame.event === "error") {
                if (payload.xml) setXml(payload.xml);
                setSource(payload.source || "fallback");
                setStatus(payload.message || "Ollama no disponible — se usó el respaldo.", true);
              }
            }
          }
        } catch (e) {
          setStatus("Error de conexión: " + e.message, true);
        } finally {
          busy(false);
        }
      }

      draftBtn.addEventListener("click", draft);
      compileBtn.addEventListener("click", compile);

      copyBtn.addEventListener("click", async () => {
        const xml = xmlEl.value;
        if (!xml) return;
        try {
          await navigator.clipboard.writeText(xml);
          copyBtn.textContent = "✓ Copiado";
          copyBtn.classList.add("done");
          setTimeout(() => {
            copyBtn.textContent = "Copiar al portapapeles";
            copyBtn.classList.remove("done");
          }, 1500);
        } catch (e) {
          copyBtn.textContent = "No se pudo copiar (" + e.message + ")";
        }
      });
    </script>
  </body>
</html>
